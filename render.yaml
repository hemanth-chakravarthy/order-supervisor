services:
  # ── FastAPI API + Temporal Worker (combined, free plan compatible) ────────────
  - type: web
    name: order-supervisor-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false          # Neon PostgreSQL connection string
      - key: TEMPORAL_HOST
        sync: false          # order-supervisor.hyehy.tmprl.cloud:7233
      - key: TEMPORAL_NAMESPACE
        sync: false          # order-supervisor.hyehy
      - key: TEMPORAL_API_KEY
        sync: false          # Temporal Cloud API key
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: PYTHON_VERSION
        value: "3.11"
